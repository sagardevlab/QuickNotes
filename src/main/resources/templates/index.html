<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHelper</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-left">
        <h1><a href="/" style="color:white;text-decoration:none;">NoteHelper</a></h1>
        <input type="text" id="noteTitle" class="note-title-input" placeholder="Untitled note...">
    </div>
    <div class="header-right">
        <a href="/notes" class="btn btn-secondary">My Notes</a>
        <button onclick="saveNote()" class="btn btn-primary">Save</button>
        <button onclick="downloadPDF()" class="btn btn-danger">Download PDF</button>
    </div>
</header>

<main class="main">
    <div id="note-content" class="editor-container">
        <div id="editor"></div>
    </div>
</main>

<div id="toast" class="toast hidden">Saved!</div>

<!-- Pass the note ID from the server to JavaScript -->
<script th:inline="javascript">
    const NOTE_ID = /*[[${note.id}]]*/ null;
</script>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script th:src="@{/js/editor.js}"></script>

</body>
</html>
