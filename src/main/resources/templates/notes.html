<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHelper</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="aurora-mesh" aria-hidden="true"></div>

<!-- ══════════════════════════════════════════════
     SPLIT WORKSPACE
     ══════════════════════════════════════════════ -->
<div class="workspace" id="ws">

    <!-- ══ LEFT: NOTES PANEL ══════════════════════ -->
    <aside class="notes-panel" id="notesPanel">

        <!-- Panel header -->
        <div class="np-header">
            <a href="/" class="logo">
                <div class="logo-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10L12 2Z"
                              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 2V10H20M8 14H16M8 18H13"
                              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">NoteHelper</span>
            </a>
            <button class="np-close-btn" onclick="togglePanel()" title="Close panel">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18l-6-6 6-6"
                          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- New note button -->
        <div class="np-new-wrap">
            <button class="np-new-btn" onclick="newNote()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5v14M5 12h14"
                          stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                New Note
            </button>
        </div>

        <!-- Scrollable note list -->
        <div class="np-scroll" id="notesList">

            <div th:if="${#lists.isEmpty(notes)}" class="np-empty">
                No notes yet.<br>Click New Note to begin.
            </div>

            <div th:unless="${#lists.isEmpty(notes)}"
                 class="np-item"
                 th:each="note : ${notes}"
                 th:data-id="${note.id}"
                 th:onclick="'loadNote(' + ${note.id} + ')'">
                <div class="np-item-title"
                     th:text="${note.title != null && !note.title.isEmpty() ? note.title : 'Untitled'}">
                    Untitled
                </div>
                <div class="np-item-date"
                     th:text="${#temporals.format(note.updatedAt, 'MMM dd, yyyy')}">
                    Date
                </div>
                <button class="np-item-del"
                        th:onclick="'event.stopPropagation(); deleteNote(' + ${note.id} + ')'"
                        title="Delete note">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12"
                              stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

        </div>

        <!-- User + sign out -->
        <div class="np-footer">
            <div class="np-user">
                <img class="np-avatar"
                     th:src="${#authentication.principal.attributes['picture']}"
                     alt="avatar"/>
                <span class="np-username"
                      th:text="${#authentication.principal.attributes['name']}">User</span>
            </div>
            <form th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-signout">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
                              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Sign out
                </button>
            </form>
        </div>

    </aside>

    <!-- ══ RIGHT: EDITOR PANEL ════════════════════ -->
    <div class="editor-panel">

        <!-- Editor top bar -->
        <div class="ep-topbar">
            <div class="ep-left">
                <!-- Hamburger toggle -->
                <button class="ep-toggle-btn" onclick="togglePanel()" title="Toggle notes panel">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M3 6h18M3 12h18M3 18h18"
                              stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                    </svg>
                </button>
                <!-- Logo fades in when panel is closed -->
                <a href="/" class="logo ep-ghost-logo">
                    <div class="logo-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10L12 2Z"
                                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 2V10H20M8 14H16M8 18H13"
                                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="logo-text">NoteHelper</span>
                </a>
            </div>
            <div class="ep-right">
                <button onclick="saveNote()" class="btn btn-primary">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
                              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17 21v-8H7v8M7 3v5h8"
                              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="btn-label">Save</span>
                </button>
                <button onclick="downloadPDF()" class="btn btn-danger">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M12 16L8 12M12 16L16 12M12 16V4M20 20H4"
                              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="btn-label">PDF</span>
                </button>
                <div class="user-chip">
                    <img class="chip-avatar"
                         th:src="${#authentication.principal.attributes['picture']}"
                         alt="avatar"/>
                    <span class="chip-name"
                          th:text="${#authentication.principal.attributes['name']}"></span>
                </div>
            </div>
        </div>

        <!-- Warm paper writing surface -->
        <div class="paper">
            <div class="title-zone">
                <input type="text"
                       id="noteTitle"
                       class="note-title-input"
                       placeholder="Give your note a title…"
                       autocomplete="off"/>
            </div>
            <div class="title-rule">
                <div class="title-rule-line"></div>
            </div>
            <div id="note-content">
                <div id="editor"></div>
            </div>
        </div>

        <!-- Status bar -->
        <div class="status-bar">
            <span class="status-left">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Select a note or click New Note</span>
            </span>
            <span class="status-hint">Auto-saves every 30 s</span>
        </div>

    </div><!-- .editor-panel -->

</div><!-- .workspace -->

<div id="toast" class="toast hidden"></div>

<div class="watermark">made by <span>sagardevlab</span></div>

<!-- Delete confirmation modal -->
<div id="deleteModal" class="modal-overlay hidden" onclick="handleModalOverlayClick(event)">
    <div class="modal-card">
        <div class="modal-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h3 class="modal-title">Delete Note</h3>
        <p class="modal-body">This note will be permanently deleted and cannot be recovered.</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn btn-danger" onclick="confirmDelete()">Confirm Delete</button>
        </div>
    </div>
</div>

<!-- Undo bar -->
<div id="undoBar" class="undo-bar hidden">
    <span>Note updated</span>
    <button class="undo-btn" onclick="undoApply()">Undo</button>
</div>

<!-- ── AI Chat floating button ───────────────────── -->
<button class="ai-fab" onclick="toggleAIChat()" id="aiFab" title="AI Assistant">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"
              fill="currentColor" opacity=".18"/>
        <circle cx="8.5" cy="12" r="1.2" fill="currentColor"/>
        <circle cx="12" cy="12" r="1.2" fill="currentColor"/>
        <circle cx="15.5" cy="12" r="1.2" fill="currentColor"/>
    </svg>
</button>

<!-- ── AI Chat panel ──────────────────────────────── -->
<div class="ai-chat-panel" id="aiChatPanel">
    <div class="ai-chat-header">
        <div class="ai-chat-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37C8.42 21.5 10.15 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"
                      fill="currentColor" opacity=".4"/>
                <circle cx="8.5" cy="12" r="1.3" fill="currentColor"/>
                <circle cx="12" cy="12" r="1.3" fill="currentColor"/>
                <circle cx="15.5" cy="12" r="1.3" fill="currentColor"/>
            </svg>
            AI Assistant
        </div>
        <button class="ai-close-btn" onclick="toggleAIChat()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages"></div>
    <div class="ai-chat-input-row">
        <textarea class="ai-chat-input" id="aiChatInput"
                  placeholder="Ask anything… e.g. make this professional"
                  rows="1"></textarea>
        <button class="ai-send-btn" id="aiSendBtn" onclick="sendAIMessage()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
                      stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ═══════════════════════════════════════════════
   NoteHelper — Merged Workspace Script
   ═══════════════════════════════════════════════ */

let currentNoteId = null;
let isSaving      = false;
let isLoading     = false;
let autoSaveTimer = null;

// ── Quill ────────────────────────────────────────
const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Start writing here…',
    modules: {
        toolbar: {
            container: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                [{ align: [] }],
                ['image', 'link'],
                ['clean']
            ],
            handlers: { image: imageHandler }
        }
    }
});

// ── Panel toggle ─────────────────────────────────
const ws = document.getElementById('ws');

function togglePanel() {
    ws.classList.toggle('panel-closed');
    localStorage.setItem('np_closed', ws.classList.contains('panel-closed') ? '1' : '0');
}

// Restore last state
if (localStorage.getItem('np_closed') === '1') ws.classList.add('panel-closed');

// ── Load a note into the editor ──────────────────
async function loadNote(id) {
    if (isLoading) return;
    isLoading = true;
    setStatus('Loading…', '');

    try {
        const note = await fetch('/api/notes/' + id).then(r => r.json());
        currentNoteId = note.id;
        document.getElementById('noteTitle').value = note.title || '';
        quill.clipboard.dangerouslyPasteHTML(note.content || '');
        setActiveNote(id);
        setStatus('All changes saved', 'saved');
        if (window.innerWidth <= 768) ws.classList.add('panel-closed');
    } catch {
        showToast('Error loading note');
        setStatus('Error', 'error');
    } finally {
        isLoading = false;
    }
}

// ── New blank note — auto-creates in DB immediately ──────────────────────────
async function newNote() {
    if (isSaving || isLoading) return;
    isSaving = true;
    setStatus('Creating…', 'saving');

    try {
        const res = await fetch('/api/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: 'Untitled', content: '' })
        });
        if (res.ok) {
            const note = await res.json();
            currentNoteId = note.id;
            document.getElementById('noteTitle').value = '';
            quill.setContents([{ insert: '\n' }]);
            setStatus('New note — start writing', '');
            await refreshPanel();
            setActiveNote(currentNoteId);
        } else {
            setStatus('Error creating note', 'error');
        }
    } catch {
        setStatus('Error', 'error');
    } finally {
        isSaving = false;
        document.getElementById('noteTitle').focus();
    }
}

// ── Highlight active item in panel ───────────────
function setActiveNote(id) {
    document.querySelectorAll('.np-item').forEach(el => {
        el.classList.toggle('active', id !== null && parseInt(el.dataset.id) === id);
    });
}

// ── Save ─────────────────────────────────────────
async function saveNote(silent = false) {
    if (isSaving || isLoading) return;

    const title   = document.getElementById('noteTitle').value.trim() || 'Untitled';
    const content = quill.root.innerHTML;
    const url     = currentNoteId ? '/api/notes/' + currentNoteId : '/api/notes';
    const method  = currentNoteId ? 'PUT' : 'POST';

    isSaving = true;
    setStatus('Saving…', 'saving');

    try {
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });

        if (res.ok) {
            const saved = await res.json();
            if (!currentNoteId) currentNoteId = saved.id;
            setStatus('All changes saved', 'saved');
            if (!silent) showToast('Note saved!');
            await refreshPanel();
            setActiveNote(currentNoteId);
        } else {
            setStatus('Save failed', 'error');
            if (!silent) showToast('Error saving note');
        }
    } catch {
        setStatus('Save failed', 'error');
        if (!silent) showToast('Error saving note');
    } finally {
        isSaving = false;
    }
}

// ── Delete a note ────────────────────────────────
let pendingDeleteId = null;

function deleteNote(id) {
    pendingDeleteId = id;
    document.getElementById('deleteModal').classList.remove('hidden');
}

function closeDeleteModal() {
    pendingDeleteId = null;
    document.getElementById('deleteModal').classList.add('hidden');
}

function handleModalOverlayClick(e) {
    if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
}

async function confirmDelete() {
    if (pendingDeleteId === null) return;
    const id = pendingDeleteId;
    closeDeleteModal();
    await fetch('/api/notes/' + id, { method: 'DELETE' });
    if (id === currentNoteId) newNote();
    showToast('Note deleted');
    await refreshPanel();
}

// ── Refresh note list in panel ───────────────────
async function refreshPanel() {
    const notes = await fetch('/api/notes').then(r => r.json());
    const list  = document.getElementById('notesList');
    if (!list) return;

    if (notes.length === 0) {
        list.innerHTML = '<div class="np-empty">No notes yet.<br>Click New Note to begin.</div>';
        return;
    }

    list.innerHTML = notes.map(note => {
        const title  = esc((note.title && note.title.trim()) ? note.title : 'Untitled');
        const date   = fmtDate(note.updatedAt);
        const active = note.id === currentNoteId ? 'active' : '';
        return `
        <div class="np-item ${active}" data-id="${note.id}" onclick="loadNote(${note.id})">
            <div class="np-item-title">${title}</div>
            <div class="np-item-date">${date}</div>
            <button class="np-item-del"
                    onclick="event.stopPropagation(); deleteNote(${note.id})"
                    title="Delete note">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12"
                          stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>`;
    }).join('');
}

// ── Image upload ─────────────────────────────────
function imageHandler() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.click();
    input.onchange = () => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const range = quill.getSelection(true);
            quill.insertEmbed(range.index, 'image', e.target.result);
            quill.setSelection(range.index + 1);
        };
        reader.readAsDataURL(file);
    };
}

// ── AI Chat ──────────────────────────────────────
let chatHistory = [];
let aiChatOpen  = false;

const QUICK_ACTIONS = [
    { label: '✦ Summarize',          msg: 'Summarize this note in bullet points' },
    { label: '✦ Make professional',  msg: 'Rewrite this note in a professional tone' },
    { label: '✦ Fix grammar',        msg: 'Fix grammar and spelling mistakes' },
    { label: '✦ Expand content',     msg: 'Expand this note with more detail and examples' },
    { label: '✦ Make shorter',       msg: 'Make this note shorter and more concise' },
    { label: '✦ Simplify language',  msg: 'Rewrite this in simple, easy-to-understand language' },
];

function toggleAIChat() {
    aiChatOpen = !aiChatOpen;
    document.getElementById('aiChatPanel').classList.toggle('open', aiChatOpen);
    document.getElementById('aiFab').classList.toggle('active', aiChatOpen);
    if (aiChatOpen) {
        if (chatHistory.length === 0) {
            pushAI("Hi! What would you like to do with your note?");
        }
        document.getElementById('aiChatInput').focus();
    }
}

function pushAI(text, content = null) {
    chatHistory.push({ role: 'ai', text, content });
    renderChat();
}

function renderChat() {
    const c = document.getElementById('aiChatMessages');
    const hasUserMsg = chatHistory.some(m => m.role === 'user');
    const chips = !hasUserMsg
        ? `<div class="quick-actions">${QUICK_ACTIONS.map(a =>
            `<button class="quick-chip" onclick="sendQuickAction(${JSON.stringify(a.msg)})">${a.label}</button>`
          ).join('')}</div>`
        : '';
    c.innerHTML = chatHistory.map((msg, i) => {
        if (msg.role === 'user') {
            return `<div class="chat-bubble chat-user">${esc(msg.text)}</div>`;
        }
        const preview = msg.content
            ? `<div class="chat-content-preview">${esc(msg.content)}</div>
               <button class="chat-apply-btn" onclick="applyToNote(${i})">↑ Apply to note</button>`
            : '';
        return `<div class="chat-bubble-wrap">
            <div class="chat-bubble chat-ai">${esc(msg.text)}</div>
            ${preview}
        </div>`;
    }).join('') + chips;
    c.scrollTop = c.scrollHeight;
}

function sendQuickAction(message) {
    document.getElementById('aiChatInput').value = message;
    sendAIMessage();
}

async function sendAIMessage() {
    const input = document.getElementById('aiChatInput');
    const message = input.value.trim();
    if (!message) return;

    input.value = '';
    input.style.height = 'auto';
    chatHistory.push({ role: 'user', text: message });
    renderChat();

    const c = document.getElementById('aiChatMessages');
    const tid = 'typing-' + Date.now();
    c.insertAdjacentHTML('beforeend',
        `<div id="${tid}" class="chat-bubble chat-ai chat-typing"><span></span><span></span><span></span></div>`);
    c.scrollTop = c.scrollHeight;

    document.getElementById('aiSendBtn').disabled = true;
    try {
        const noteContent = quill.root.innerHTML;
        const res  = await fetch('/api/ai-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, noteContent })
        });
        const data = await res.json();
        document.getElementById(tid)?.remove();
        if (res.ok) {
            pushAI(data.reply, data.content || null);
        } else {
            pushAI(data.error || 'Something went wrong. Please try again.');
        }
    } catch {
        document.getElementById(tid)?.remove();
        pushAI('Connection error. Please try again.');
    } finally {
        document.getElementById('aiSendBtn').disabled = false;
    }
}

let previousNoteContent = null;
let undoBarTimer = null;

function applyToNote(index) {
    const content = chatHistory[index]?.content;
    if (!content) return;
    previousNoteContent = quill.root.innerHTML;
    const paragraphs = content.split('\n\n').filter(p => p.trim());
    const html = paragraphs.length > 1
        ? paragraphs.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('')
        : `<p>${content.replace(/\n/g, '<br>')}</p>`;
    quill.clipboard.dangerouslyPasteHTML(html);
    if (currentNoteId) saveNote(true);
    showUndoBar();
}

function showUndoBar() {
    const bar = document.getElementById('undoBar');
    bar.classList.remove('hidden');
    clearTimeout(undoBarTimer);
    undoBarTimer = setTimeout(() => {
        bar.classList.add('hidden');
        previousNoteContent = null;
    }, 7000);
}

function undoApply() {
    if (!previousNoteContent) return;
    quill.clipboard.dangerouslyPasteHTML(previousNoteContent);
    if (currentNoteId) saveNote(true);
    previousNoteContent = null;
    clearTimeout(undoBarTimer);
    document.getElementById('undoBar').classList.add('hidden');
    showToast('Undone!');
}

document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('aiChatInput');
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMessage(); }
    });
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 90) + 'px';
    });
});

// ── PDF download ─────────────────────────────────
async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    showToast('Generating PDF…');

    const canvas = await html2canvas(document.getElementById('note-content'), {
        scale: 2, useCORS: true, backgroundColor: '#ffffff'
    });

    const pdf      = new jsPDF('p', 'mm', 'a4');
    const margin   = 14;
    const cW       = 210 - margin * 2;
    const imgH     = (canvas.height * cW) / canvas.width;
    let   left     = imgH;
    let   y        = margin;

    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, y, cW, imgH);
    left -= (297 - margin * 2);
    while (left > 0) {
        pdf.addPage();
        y = margin - (imgH - left);
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', margin, y, cW, imgH);
        left -= (297 - margin * 2);
    }

    const title = document.getElementById('noteTitle').value.trim() || 'note';
    pdf.save(title + '.pdf');
    showToast('PDF downloaded!');
}

// ── Auto-save every 30 s ─────────────────────────
setInterval(() => {
    if (!isLoading && !isSaving && currentNoteId && quill.getText().trim().length > 1) {
        saveNote(true);
    }
}, 30000);

// ── Auto-save on title change (debounced 800 ms) ─
document.getElementById('noteTitle').addEventListener('input', () => {
    const hasTitle = document.getElementById('noteTitle').value.trim().length > 0;
    if (!hasTitle && !currentNoteId) return;
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => saveNote(true), 800);
});

// ── Auto-save on content change (debounced 800 ms)
quill.on('text-change', () => {
    if (isLoading) return;
    const hasContent = quill.getText().trim().length > 0;
    if (!hasContent && !currentNoteId) return;
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => saveNote(true), 800);
});

// ── Helpers ──────────────────────────────────────
function setStatus(text, state) {
    const dot = document.getElementById('statusDot');
    const lbl = document.getElementById('statusText');
    if (!dot || !lbl) return;
    dot.className   = 'status-dot' + (state ? ' ' + state : '');
    lbl.textContent = text;
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2200);
}

function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
</script>
